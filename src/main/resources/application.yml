spring:
  application:
    name: yu-ai-code-mother-backend
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yu_ai_code_mother}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  # redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: ${OPENAI_CHAT_BASE_URL:https://api.deepseek.com}
      api-key: ${OPENAI_CHAT_API_KEY:}
      model-name: ${OPENAI_CHAT_MODEL:deepseek-chat}
#      strict-json-schema: true
#      response-format: json_object
      max-tokens: 8192
      log-requests: false
      log-responses: false
      max-retries: 3
    streaming-chat-model:
      base-url: ${OPENAI_STREAM_BASE_URL:https://api.deepseek.com}
      api-key: ${OPENAI_STREAM_API_KEY:${OPENAI_CHAT_API_KEY:}}
      model-name: ${OPENAI_STREAM_MODEL:deepseek-chat}
      max-tokens: 8192
      log-requests: false
      log-responses: false
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${OPENAI_REASONING_BASE_URL:https://api.deepseek.com}
      api-key: ${OPENAI_REASONING_API_KEY:${OPENAI_CHAT_API_KEY:}}
      model-name: ${OPENAI_REASONING_MODEL:deepseek-reasoner}
      max-tokens: 32768
      temperature: 0.1
      log-requests: false
      log-responses: false
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${OPENAI_ROUTING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${OPENAI_ROUTING_API_KEY:}
      model-name: ${OPENAI_ROUTING_MODEL:qwen-turbo}
      max-tokens: 100
      log-requests: false
      log-responses: false
# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:}
# Pexels 图片搜索配置
pexels:
  api-key: ${PEXELS_API_KEY:}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:${OPENAI_ROUTING_API_KEY:}}
  image-model: ${DASHSCOPE_IMAGE_MODEL:wan2.2-t2i-flash}
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
